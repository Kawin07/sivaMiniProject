<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP Trigger</title>
    <style>
      :root {
        --blue-dark: #0f2f57;
        --blue-light: #eaf2fb;
        --white: #ffffff;
        --line: #c9d8ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: var(--white);
      }

      .wrap {
        width: min(620px, 92vw);
        margin: 42px auto;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 22px;
      }

      h1 {
        margin: 0;
        color: var(--blue-dark);
      }

      p {
        margin: 10px 0 0;
        color: #3f5878;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      button {
        border: 1px solid var(--blue-dark);
        background: var(--blue-dark);
        color: var(--white);
        border-radius: 8px;
        padding: 11px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #123968;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      #stopBtn {
        background: #f5f8fc;
        color: var(--blue-dark);
      }

      #stopBtn:hover {
        background: #e8f0fb;
      }

      pre {
        margin-top: 14px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--blue-light);
        overflow: auto;
        max-height: 260px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>ESP Trigger Control</h1>
      <p>Runs inside this same project at <strong>/trigger</strong> and calls local API routes.</p>

      <div class="actions">
        <button id="startBtn" type="button">Start Trigger</button>
        <button id="stopBtn" type="button">Stop Trigger</button>
      </div>
      <pre id="output">Ready.</pre>
    </main>

    <script>
      const API_ENDPOINT = "/api/esp-trigger";
      const TRIGGER_SOURCE = "local-trigger-page";

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const output = document.getElementById("output");

      async function sendTrigger(action) {
        startBtn.disabled = true;
        stopBtn.disabled = true;
        output.textContent = `Sending ${action} trigger...`;

        try {
          const response = await fetch(API_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              action,
              source: TRIGGER_SOURCE,
            }),
          });

          const data = await response.json();
          if (action === "stop") {
            data.liveData = "----";
          }
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = JSON.stringify(
            {
              ok: false,
              error: error.message,
            },
            null,
            2
          );
        } finally {
          startBtn.disabled = false;
          stopBtn.disabled = false;
        }
      }

      startBtn.addEventListener("click", () => sendTrigger("start"));
      stopBtn.addEventListener("click", () => sendTrigger("stop"));
    </script>
  </body>
</html>
